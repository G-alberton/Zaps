<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="assets/mascor.png" type="image/x-icon">
    <title>Envia Mascor</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <header class="sidebar-header">
                <h3>Contatos</h3>
            </header>
            
            <div class="contacts-list">
                <div class="contact-card active">
                    <div class="contact-avatar"></div>
                    <div class="contact-info">
                        <span class="contact-name">João Silva</span>
                        <span class="contact-last-msg">Olá! Gostaria de saber...</span>
                    </div>
                </div>

                <div class="contact-card">
                    <div class="contact-avatar"></div>
                    <div class="contact-info">
                        <span class="contact-name">Paulo Gomes</span>
                        <span clas="contact-last-msg">Obrigado por ser Bonitão ...</span>
                    </div>
                </div>
            </div>
        </aside>

        <main class="chat-area">
            <header class="chat-header">
                <div class="chat-header-info">
                    <strong>João Silva</strong> 
                </div>
                <div class="chat-search-wrapper">
                    <input type="text" id="message-search" placeholder="Pesquisar Mensagem">
                    <button id="search-button">🔍</button>
                </div>
            </header>
    
        <div class="messages-container">
        </div>

        <div id="drop-zone-overlay">
            <div class="drop-zone-content">
                <span>📁 Solte o arquivo para enviar</span>
            </div>
        </div>

    <footer class="chat-input-area">
        <input type="file" id="file-input" style="display: none;" multiple>
        <button class="attach-button" id="attach-btn">📎</button>

        <div id="recording-status" style="display: none !important">
            <div class="red-dot"></div>
            <span id="recording-timer">00:00</span>
            <span style="margin-left: 10px; color: #666">Gravando...</span>
        </div>

        <textarea id="chat-input" placeholder="Digite uma mensagem..." rows="1"></textarea>
        
        <button class="audio-button">🎙️</button>
        <button class="send-button" style="display: none;">Enviar</button>
    </footer>
</main>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
