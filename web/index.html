<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Dashboard</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <header class="sidebar-header">
                <h3>Contatos</h3>
            </header>
            
            <div class="contacts-list">
                <div class="contact-card active">
                    <div class="contact-avatar"></div>
                    <div class="contact-info">
                        <span class="contact-name">João Silva</span>
                        <span class="contact-last-msg">Olá! Gostaria de saber...</span>
                    </div>
                </div>

                <div class="contact-card">
                    <div class="contact-avatar"></div>
                    <div class="contact-info">
                        <span class="contact-name">Paulo Gomes</span>
                        <span clas="contact-last-msg">Obrigado por ser Bonitão ...</span>
                    </div>
                </div>
            </div>
        </aside>

        <main class="chat-area">
            <header class="chat-header">
                <strong>João Silva</strong> </header>
            
            <div class="messages-container">
                <div class="message-row message-received">
                    <div class="message-bubble">
                        <div class="message-options-btn"><span>&#9013</span></div>
                        <div class="message-menu">
                            <button onclick="handleReply(this)">Responder</button>
                            <button onclick="handleCopy(this)">Copiar</button>
                            <button onclick="handleForward(this)">Encaminhar</button>
                            <hr>
                            <button class="delete-btn" onclick="handleDelete(this)">Apagar</button>
                        </div>
                        Olá! Gostaria de saber o status do meu contrato #1234,
                        <span class="message-time">13:31</span>
                    </div>
                </div>

                <div class="message-row message-sent">
                    <div class="message-bubble">
                        <div class="message-options-btn"><span>&#9013</span></div>
                        <div class="message-menu">
                            <button onclick="handleReply(this)">Responder</button>
                            <button onclick="handleCopy(this)">Copiar</button>
                            <button onclick="handleForward(this)">Encaminhar</button>
                            <hr>
                            <button class="delete-btn" onclick="handleDelete(this)">Apagar</button>
                        </div>
                        Com certeza João, vou verificar agora
                        <span class="message-time">13:42</span>
                    </div>
                </div>
            </div>
            
            <footer class="chat-input-area">
                <input type="text" placeholder="Digite uma mensagem...">
                <button class="send-button">Enviar</button>
            </footer>
        </main>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
